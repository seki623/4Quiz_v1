<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100問クイズアプリ</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        #quiz-container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }
        h2 {
            font-size: 1.2rem;
            color: #333;
            line-height: 1.5;
            margin-bottom: 20px;
        }
        #choices {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        button {
            padding: 12px 15px;
            font-size: 1rem;
            cursor: pointer;
            border: 2px solid #ddd;
            border-radius: 8px;
            background-color: #fff;
            transition: all 0.2s;
            text-align: left;
        }
        button:hover:not(:disabled) {
            background-color: #f8f9fa;
            border-color: #bbb;
        }
        button:disabled {
            cursor: default;
            color: #333;
        }
        /* 解説エリアのスタイル */
        #explanation-container {
            margin-top: 20px;
            padding: 15px;
            background-color: #f1f7ff;
            border-radius: 10px;
            border-left: 5px solid #007bff;
            text-align: left;
        }
        #result-text {
            font-weight: bold;
            font-size: 1.1rem;
            margin-top: 0;
        }
        #explanation-text {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #444;
        }
        #next-btn {
            display: block;
            width: 100%;
            margin-top: 15px;
            background-color: #007bff;
            color: white;
            border: none;
            text-align: center;
            font-weight: bold;
        }
        #next-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div id="quiz-container">
    <h2 id="question">クイズを読み込み中...</h2>
    <div id="choices"></div>

    <!-- 解説用エリア（初期状態は非表示） -->
    <div id="explanation-container" style="display:none;">
        <p id="result-text"></p>
        <p id="explanation-text"></p>
        <button id="next-btn" onclick="nextQuestion()">次の問題へ</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
