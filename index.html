<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>資格学習アプリ</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #quiz-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 500px; text-align: center; }
        button { display: block; width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; font-size: 16px; background: #fff; transition: 0.2s; }
        button:hover { background: #e7f3ff; border-color: #007bff; }
    </style>
</head>
<body>
    <div id="quiz-container">
        <h2 id="question">読み込み中...</h2>
        <div id="choices"></div>
        <div id="explanation-container" style="display:none; margin-top:20px; padding:15px; background:#eef; border-radius:8px;">
        <p id="result-text" style="font-weight:bold;"></p>
        <p id="explanation-text"></p>
        <button id="next-btn" onclick="nextQuestion()">次の問題へ</button>
    </div>
</div>
    <script src="script.js"></script>
</body>
</html>
