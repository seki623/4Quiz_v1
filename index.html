<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クイズアプリ</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #quiz-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 90%; max-width: 500px; }
        
        /* 進捗表示エリア */
        #progress-container { margin-bottom: 20px; }
        #progress-text { font-size: 0.85rem; color: #666; text-align: right; margin-bottom: 5px; }
        #progress-bar-bg { background: #eee; height: 10px; border-radius: 5px; overflow: hidden; }
        #progress-bar-fill { background: #007bff; height: 100%; width: 0%; transition: width 0.3s ease; }

        h2 { font-size: 1.2rem; line-height: 1.5; margin: 10px 0 20px; }
        #choices { display: flex; flex-direction: column; gap: 10px; }
        button { padding: 12px; font-size: 1rem; cursor: pointer; border: 2px solid #ddd; border-radius: 8px; background: #fff; transition: all 0.2s; text-align: left; }
        button:disabled { color: #333; cursor: default; }
        
        #explanation-container { margin-top: 20px; padding: 15px; background: #f1f7ff; border-radius: 10px; border-left: 5px solid #007bff; display: none; }
        #result-text { font-weight: bold; margin-bottom: 10px; }
        #next-btn { width: 100%; margin-top: 15px; background: #007bff; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="quiz-container">
    <!-- 進捗バーエリア -->
    <div id="progress-container">
        <div id="progress-text">0 / 0</div>
        <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
    </div>

    <h2 id="question">読み込み中...</h2>
    <div id="choices"></div>

    <div id="explanation-container">
        <p id="result-text"></p>
        <p id="explanation-text"></p>
        <button id="next-btn" onclick="nextQuestion()">次の問題へ</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
